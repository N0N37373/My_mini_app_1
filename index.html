<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 15px;
        }
        .photo {
            width: 200px;
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Привет, мир!</h1>
    <p id="user-info"></p>
    
    <!-- Замени ссылку ниже на свою -->
    <img class="photo" src="https://github.com/N0N37373/My_mini_app_1/blob/301954d5e5a6359bae3fdb56c131a57d76845299/wzh6ekwnz9rmy0cynzyb8h87m0_result_0.png" alt="фото">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerText =
                `Привет, ${user.first_name}! Ты открыл приложение через Telegram.`;
        }

        document.body.style.backgroundColor = tg.backgroundColor;
        document.body.style.color = tg.textColor;
    </script>
</body>
</html>
