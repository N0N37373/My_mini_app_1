<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
    <style>
        #loader {
            position: fixed;
            top:0; left:0;
            width: 100%; height:100%;
            background-color: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-family: sans-serif;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loader.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        h1 {
            color: white;
        }
        body {
            color: black;
            font-family: sans-serif;
            padding: 15px;
        }
        .photo {
            width: 200px;
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }
        p {
            color: white;
            border: black;
        }
        #app-cotent {
            display: none;
        }
    </style>
</head>
<body>
    <div id='loader'>
        <p id='loader-text'>Загрузка...</p>
    </div>
    
    
    
    <h1>Привет, мир!</h1>
    <p id="user-info"></p>
    
    <!-- Замени ссылку ниже на свою -->
    <a href="https://ibb.co/DD86wv7b">
        <img src="https://i.ibb.co/BVr7TQgP/wzh6ekwnz9rmy0cynzyb8h87m0-result-0.png" alt="wzh6ekwnz9rmy0cynzyb8h87m0-result-0" border="0">
    </a>
    <p>Фото :)</p>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerText =
                `Привет, ${user.first_name}! Ты открыл приложение через Telegram.`;
        }

        document.body.style.backgroundColor = tg.backgroundColor;
        document.body.style.color = tg.textColor;

        const loader = document.getElementByld('loader');
        const loaderText = document.getElementByld('loader-text');

        const phrases = [
            'Загружаем...',
            'Почти готово...',
            'Подожди секунду...'
        ];

        function setRandomPhrase() {
            const randomIndex = Math.floor(Math.random() * phrases.lenth);
            loaderText.textContent = phrases[randomIndex];
        }

        let interval = setInterval(setRandomPhrase, 1000);
        setRandomPhrase();

        function HideLoader() {
           clearInterval(interval);
        loader.classList.add('fade-out');
    
        setTimeout(() => {
            loader.style.display = 'none';
            }, 500);
        }

        window.addEventListener('load', () => {
            setTimeout(hideLoader, 800);
        });

    </script>
</body>
</html>
