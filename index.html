<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
    <style>
        body {
            background-color: black;
            font-family: sans-serif;
            padding: 15px;
        }
        .photo {
            width: 200px;
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }
        p {
            color: white;
            border: black;
        }
    </style>
</head>
<body>
    <h1>Привет, мир!</h1>
    <p id="user-info"></p>
    
    <!-- Замени ссылку ниже на свою -->
    <a href="https://ibb.co/DD86wv7b">
        <img src="https://i.ibb.co/BVr7TQgP/wzh6ekwnz9rmy0cynzyb8h87m0-result-0.png" alt="wzh6ekwnz9rmy0cynzyb8h87m0-result-0" border="0">
    </a>
    <p>Фото :)</p>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerText =
                `Привет, ${user.first_name}! Ты открыл приложение через Telegram.`;
        }

        document.body.style.backgroundColor = tg.backgroundColor;
        document.body.style.color = tg.textColor;
    </script>
</body>
</html>
