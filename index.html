<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
</head>
<body>
    <h1>Привет, мир!</h1>
    <p id="user-info"></p>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerText =
                `Привет, ${user.first_name}! Ты открыл приложение через Telegram.`;
        }
    <p>
        <img src="https://github.com/N0N37373/My_mini_app_1/blob/f8734f03d36e04a991aac06a64ad1279826968b1/wzh6ekwnz9rmy0cynzyb8h87m0_result_0.png">
    </p>
        document.body.style.backgroundColor = tg.backgroundColor;
        document.body.style.color = tg.textColor;
    </script>
</body>
</html>
